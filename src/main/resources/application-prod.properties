spring.application.name=barber-management-system
server.port=6868
server.servlet.context-path=/api
# MySQL Configuration (use environment variables for prod)
spring.datasource.url=jdbc:mysql://${DATA_SOURCE_HOST:localhost}:${DATA_SOURCE_PORT:3306}/${DATA_MASTER_DATA:barber-shop-mgmt}?useSSL=true&serverTimezone=UTC
spring.datasource.username=${DATA_SOURCE_USERNAME}
spring.datasource.password=${DATA_SOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
# Logging - minimal logging in production
logging.level.root=WARN
logging.level.com.barbershop=INFO
logging.level.org.springframework.security=WARN

# JWT Configuration
jwt.secret=${JWT_SECRET}
# Access token expiration time in milliseconds (24 hours)
jwt.expiration=86400000
# Refresh token expiration time in milliseconds (7 days)
jwt.refresh-expiration=604800000

# File Upload
spring.servlet.multipart.max-file-size=10MB

