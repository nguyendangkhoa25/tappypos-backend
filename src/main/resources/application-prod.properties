spring.application.name=Tappy Pos
server.port=6868
server.servlet.context-path=/api

# ─── Server error responses ────────────────────────────────────────────────────
# Never expose internal details in error responses
server.error.include-message=never
server.error.include-stacktrace=never
server.error.include-binding-errors=never
server.error.include-exception=false

# ─── PostgreSQL ───────────────────────────────────────────────────────────────
# All values MUST come from environment variables in production — no defaults
spring.datasource.url=jdbc:postgresql://${DATA_SOURCE_HOST}:${DATA_SOURCE_PORT}/${DATA_MASTER_DATA}
spring.datasource.username=${DATA_SOURCE_USERNAME}
spring.datasource.password=${DATA_SOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ─── HikariCP connection pool ─────────────────────────────────────────────────
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.leak-detection-threshold=60000
spring.datasource.hikari.pool-name=TappyPosHikari

# ─── JPA ──────────────────────────────────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# ─── Logging ──────────────────────────────────────────────────────────────────
logging.level.root=WARN
logging.level.com.knp=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate=WARN
# Write logs to file for production observability
app.log.path=/app/logs
logging.file.name=/app/logs/tappypos.log
logging.logback.rollingpolicy.max-file-size=50MB
logging.logback.rollingpolicy.max-history=30
logging.logback.rollingpolicy.total-size-cap=1GB

# ─── JWT ──────────────────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# ─── File Upload ──────────────────────────────────────────────────────────────
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ─── API Docs — disabled in production ────────────────────────────────────────
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

# ─── S-Invoice (Viettel) ──────────────────────────────────────────────────────
sinvoice.baseUrl=https://api-vinvoice.viettel.vn/services/einvoiceapplication/api/InvoiceAPI
sinvoice.authenticationMode=Basic
sinvoice.tokenUrl=https://api-vinvoice.viettel.vn/auth/login
sinvoice.poll.maxAttempts=5
sinvoice.poll.delay=10000

# ─── CORS ─────────────────────────────────────────────────────────────────────
system.corsAllowedOrigin=${CORS_ALLOWED_ORIGIN:https://tappypos.vn}

# ─── Field-level encryption (e-invoice credentials) ───────────────────────────
# Generate: openssl rand -base64 32
app.encryption.key=${APP_ENCRYPTION_KEY}

# ─── Cloudflare Turnstile ─────────────────────────────────────────────────────
cloudflare.turnstile.enabled=true
cloudflare.turnstile.secret=${CLOUDFLARE_TURNSTILE_SECRET}

# ─── Actuator — health endpoint for Docker healthcheck ────────────────────────
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
management.server.port=6868
