spring.application.name=Tappy Pos
server.port=6868
server.servlet.context-path=/api
# PostgreSQL Configuration
spring.datasource.url=jdbc:postgresql://${DATA_SOURCE_HOST:localhost}:${DATA_SOURCE_PORT:5432}/${DATA_MASTER_DATA:retail-platform}
spring.datasource.username=${DATA_SOURCE_USERNAME:postgres}
spring.datasource.password=${DATA_SOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver
# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false
# Logging
logging.level.root=INFO
#logging.level.com.knp=DEBUG
#logging.level.org.hibernate.SQL=DEBUG
#logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Spring Security Debug Logging
#logging.level.org.springframework.security=DEBUG
#logging.level.org.springframework.security.web=DEBUG
#logging.level.org.springframework.security.web.FilterChainProxy=DEBUG
#logging.level.org.springframework.security.web.authentication=DEBUG
#logging.level.org.springframework.security.authentication=DEBUG
#logging.level.org.springframework.security.access=DEBUG

# Spring Web Debug Logging
#logging.level.org.springframework.web=DEBUG
#logging.level.org.springframework.web.servlet=DEBUG
#logging.level.org.springframework.web.servlet.DispatcherServlet=DEBUG
#logging.level.org.springframework.web.servlet.mvc=DEBUG

# Servlet and Filter Debug Logging
#logging.level.org.springframework.web.filter=DEBUG
#logging.level.javax.servlet=DEBUG
#logging.level.jakarta.servlet=DEBUG

# Request/Response Logging
#logging.level.org.springframework.web.servlet.handler=DEBUG
#logging.level.org.springframework.web.servlet.HandlerMapping=DEBUG
# JWT Configuration
jwt.secret=mySecretKeyForJWTTokenGenerationThatIsAtLeast256BitsLongForHS256Algorithm
# Access token expiration time in milliseconds (24 hours)
jwt.expiration=86400000
# Refresh token expiration time in milliseconds (7 days)
jwt.refresh-expiration=604800000

# File Upload
spring.servlet.multipart.max-file-size=10MB

# S-Invoice Configuration
sinvoice.baseUrl=https://api-vinvoice.viettel.vn/services/einvoiceapplication/api/InvoiceAPI
sinvoice.authenticationMode=Basic
sinvoice.tokenUrl=https://api-vinvoice.viettel.vn/auth/login
sinvoice.poll.maxAttempts=5
sinvoice.poll.delay=10000

system.corsAllowedOrigin=https://tappypos.vn/, http://localhost:4000/, http://192.168.100.175:4000/

# DEV-ONLY encryption key — do NOT use this key in production.
# Generate a production key with: openssl rand -base64 32
app.encryption.key=dGhpcyBpcyBhIGRldiBrZXkgZm9yIHRlc3RpbmcgMTI=

# ─── Cloudflare Turnstile ─────────────────────────────────────────────────────
# Disabled in dev — set enabled=true and provide a secret key to test locally
cloudflare.turnstile.enabled=false
cloudflare.turnstile.secret=