spring.application.name=Tappy Pos
server.port=6868
server.servlet.context-path=/api
# PostgreSQL Configuration
spring.datasource.url=jdbc:postgresql://${DATA_SOURCE_HOST:localhost}:${DATA_SOURCE_PORT:5432}/${DATA_MASTER_DATA:retail_platform}
spring.datasource.username=${DATA_SOURCE_USERNAME:postgres}
spring.datasource.password=${DATA_SOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver
# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false
# Timezone — store all timestamps as Asia/Ho_Chi_Minh (UTC+7)
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Ho_Chi_Minh
spring.jackson.time-zone=Asia/Ho_Chi_Minh
# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.validate-on-migrate=false
# Logging
logging.level.root=INFO
#logging.level.com.tappy.pos=DEBUG
#logging.level.org.hibernate.SQL=DEBUG
#logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Spring Security Debug Logging
#logging.level.org.springframework.security=DEBUG
#logging.level.org.springframework.security.web=DEBUG
#logging.level.org.springframework.security.web.FilterChainProxy=DEBUG
#logging.level.org.springframework.security.web.authentication=DEBUG
#logging.level.org.springframework.security.authentication=DEBUG
#logging.level.org.springframework.security.access=DEBUG

# Spring Web Debug Logging
#logging.level.org.springframework.web=DEBUG
#logging.level.org.springframework.web.servlet=DEBUG
#logging.level.org.springframework.web.servlet.DispatcherServlet=DEBUG
#logging.level.org.springframework.web.servlet.mvc=DEBUG

# Servlet and Filter Debug Logging
#logging.level.org.springframework.web.filter=DEBUG
#logging.level.javax.servlet=DEBUG
#logging.level.jakarta.servlet=DEBUG

# Request/Response Logging
#logging.level.org.springframework.web.servlet.handler=DEBUG
#logging.level.org.springframework.web.servlet.HandlerMapping=DEBUG
# JWT Configuration
jwt.secret=${JWT_SECRET:mySecretKeyForJWTTokenGenerationThatIsAtLeast256BitsLongForHS256Algorithm}
# Access token expiration time in milliseconds (24 hours)
jwt.expiration=86400000
# Refresh token expiration time in milliseconds (30 days)
jwt.refresh-expiration=2592000000

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=15MB
# API Documentation
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# S-Invoice Configuration
sinvoice.baseUrl=https://api-vinvoice.viettel.vn/services/einvoiceapplication/api/InvoiceAPI
sinvoice.authenticationMode=Basic
sinvoice.tokenUrl=https://api-vinvoice.viettel.vn/auth/login
sinvoice.poll.maxAttempts=5
sinvoice.poll.delay=10000

system.corsAllowedOrigin=https://quanlycuahang.com/

# Field-level encryption for sensitive DB columns (e-invoice credentials).
# Must be a Base64-encoded 32-byte (256-bit) key.
# Generate: openssl rand -base64 32
# In production set the APP_ENCRYPTION_KEY environment variable.
app.encryption.key=${APP_ENCRYPTION_KEY:}

# Open Food Facts Integration
# Set off.enabled=false to disable both live barcode lookup (layer 3) and bulk sync.
off.enabled=true
# Optional credentials for higher rate limits on bulk sync (avoids 503s).
# Register a free account at world.openfoodfacts.org, then set these env vars.
off.user-id=${OFF_USER_ID:}
off.password=${OFF_PASSWORD:}

# Google Drive Integration
# Setup: console.cloud.google.com → Google Auth Platform → Get started → Data access (add drive.file + userinfo.email scopes)
#        → Clients → Create client (Web application) → add redirect URIs below → copy Client ID + Secret.
# Full setup guide: deployment-guide.md → "Google Drive Integration Setup"
# Add redirect URI: https://tappypos.vn/api/integrations/oauth/callback (prod)
#                   http://localhost:6868/api/integrations/oauth/callback (dev)
integration.google-drive.client-id=${GOOGLE_DRIVE_CLIENT_ID:}
integration.google-drive.client-secret=${GOOGLE_DRIVE_CLIENT_SECRET:}
integration.google-drive.redirect-uri=${GOOGLE_DRIVE_REDIRECT_URI:http://localhost:6868/api/integrations/oauth/callback}

# Frontend base URL (used to build OAuth callback redirects)
app.frontend-url=${FRONTEND_URL:http://localhost:4000}
