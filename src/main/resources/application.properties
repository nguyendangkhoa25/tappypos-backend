spring.application.name=Tappy Pos
server.port=6868
server.servlet.context-path=/api
# PostgreSQL Configuration
spring.datasource.url=jdbc:postgresql://${DATA_SOURCE_HOST:localhost}:${DATA_SOURCE_PORT:5432}/${DATA_MASTER_DATA:retail_platform}
spring.datasource.username=${DATA_SOURCE_USERNAME:postgres}
spring.datasource.password=${DATA_SOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver
# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false
# Timezone — store all timestamps as Asia/Ho_Chi_Minh (UTC+7)
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Ho_Chi_Minh
spring.jackson.time-zone=Asia/Ho_Chi_Minh
# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.validate-on-migrate=false
# Logging
logging.level.root=INFO
# Surface the per-request trace id (RequestTraceFilter) + tenant id (TenantContext) in every log line.
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level [%X{requestId:-}] [%X{tenantId:-}] %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level [%X{requestId:-}] [%X{tenantId:-}] %logger{36} - %msg%n
#logging.level.com.tappy.pos=DEBUG
#logging.level.org.hibernate.SQL=DEBUG
#logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Spring Security Debug Logging
#logging.level.org.springframework.security=DEBUG
#logging.level.org.springframework.security.web=DEBUG
#logging.level.org.springframework.security.web.FilterChainProxy=DEBUG
#logging.level.org.springframework.security.web.authentication=DEBUG
#logging.level.org.springframework.security.authentication=DEBUG
#logging.level.org.springframework.security.access=DEBUG

# Spring Web Debug Logging
#logging.level.org.springframework.web=DEBUG
#logging.level.org.springframework.web.servlet=DEBUG
#logging.level.org.springframework.web.servlet.DispatcherServlet=DEBUG
#logging.level.org.springframework.web.servlet.mvc=DEBUG

# Servlet and Filter Debug Logging
#logging.level.org.springframework.web.filter=DEBUG
#logging.level.javax.servlet=DEBUG
#logging.level.jakarta.servlet=DEBUG

# Request/Response Logging
#logging.level.org.springframework.web.servlet.handler=DEBUG
#logging.level.org.springframework.web.servlet.HandlerMapping=DEBUG
# JWT Configuration
# No default on purpose: boot must fail fast if JWT_SECRET is unset. dev/test/prod profiles each supply their own.
jwt.secret=${JWT_SECRET}
# Access token expiration time in milliseconds (24 hours)
jwt.expiration=86400000
# Refresh token expiration time in milliseconds (30 days)
jwt.refresh-expiration=2592000000

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=15MB
# API Documentation
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# S-Invoice Configuration
sinvoice.baseUrl=https://api-vinvoice.viettel.vn/services/einvoiceapplication/api/InvoiceAPI
sinvoice.authenticationMode=Basic
sinvoice.tokenUrl=https://api-vinvoice.viettel.vn/auth/login
sinvoice.poll.maxAttempts=5
sinvoice.poll.delay=10000

system.corsAllowedOrigin=https://quanlycuahang.com/

# Cloudflare R2 (S3-compatible object storage for product images)
# R2_ENDPOINT   = https://<account-id>.r2.cloudflarestorage.com
# R2_ACCESS_KEY / R2_SECRET_KEY = R2 API token pair
# R2_BUCKET     = bucket name (same bucket used for pg_dump backups)
# R2_PUBLIC_URL = public base URL for serving objects (custom domain or pub-*.r2.dev)
r2.endpoint=${R2_ENDPOINT:}
r2.access-key=${R2_ACCESS_KEY:}
r2.secret-key=${R2_SECRET_KEY:}
r2.bucket=${R2_BUCKET:}
r2.public-url=${R2_PUBLIC_URL:}

# Field-level encryption for sensitive DB columns (e-invoice credentials).
# Must be a Base64-encoded 32-byte (256-bit) key.
# Generate: openssl rand -base64 32
# In production set the APP_ENCRYPTION_KEY environment variable.
app.encryption.key=${APP_ENCRYPTION_KEY:}

# Open Food Facts Integration
# Set off.enabled=false to disable both live barcode lookup (layer 3) and bulk sync.
off.enabled=true

# Subscription payments (see docs/SUBSCRIPTION_PAYMENTS.md).
# Secrets come from env vars in prod; blank credentials => provider treated as "not configured".
# MoMo (sandbox endpoint by default)
payment.momo.partner-code=${MOMO_PARTNER_CODE:}
payment.momo.access-key=${MOMO_ACCESS_KEY:}
payment.momo.secret-key=${MOMO_SECRET_KEY:}
payment.momo.endpoint=${MOMO_ENDPOINT:https://test-payment.momo.vn/v2/gateway/api/create}
payment.momo.redirect-url=${MOMO_REDIRECT_URL:https://pos.tappy.vn/billing/return}
payment.momo.ipn-url=${MOMO_IPN_URL:https://pos.tappy.vn/api/payments/webhook/momo}
# VNPay (sandbox pay URL by default)
payment.vnpay.tmn-code=${VNPAY_TMN_CODE:}
payment.vnpay.hash-secret=${VNPAY_HASH_SECRET:}
payment.vnpay.pay-url=${VNPAY_PAY_URL:https://sandbox.vnpayment.vn/paymentv2/vpcpay.html}
payment.vnpay.return-url=${VNPAY_RETURN_URL:https://pos.tappy.vn/billing/return}
# VietQR (Tappy business bank account for manual transfer)
payment.vietqr.bank-bin=${VIETQR_BANK_BIN:}
payment.vietqr.bank-name=${VIETQR_BANK_NAME:}
payment.vietqr.account-no=${VIETQR_ACCOUNT_NO:}
payment.vietqr.account-name=${VIETQR_ACCOUNT_NAME:}
# Optional credentials for higher rate limits on bulk sync (avoids 503s).
# Register a free account at world.openfoodfacts.org, then set these env vars.
off.user-id=${OFF_USER_ID:}
off.password=${OFF_PASSWORD:}

# Google Drive Integration
# Setup: console.cloud.google.com → Google Auth Platform → Get started → Data access (add drive.file + userinfo.email scopes)
#        → Clients → Create client (Web application) → add redirect URIs below → copy Client ID + Secret.
# Full setup guide: docs/TECH_SPEC.md → Appendix D → "Google Drive Integration Setup"
# Add redirect URI: https://pos.tappy.vn/api/integrations/oauth/callback (prod)
#                   http://localhost:6868/api/integrations/oauth/callback (dev)
integration.google-drive.client-id=${GOOGLE_DRIVE_CLIENT_ID:}
integration.google-drive.client-secret=${GOOGLE_DRIVE_CLIENT_SECRET:}
integration.google-drive.redirect-uri=${GOOGLE_DRIVE_REDIRECT_URI:http://localhost:6868/api/integrations/oauth/callback}

# Frontend base URL (used to build OAuth callback redirects)
app.frontend-url=${FRONTEND_URL:http://localhost:4000}

# ── Tappy Message (OTP + reminders via msg.tappy.vn) ────────
# Central messaging service that owns the Zalo OA credentials and audit log. POS authenticates
# with its per-app X-API-Key and never calls Zalo directly.
# Set tappy.message.enabled=false in dev to skip the real call (OTP printed to logs).
tappy.message.enabled=${TAPPY_MESSAGE_ENABLED:false}
tappy.message.base-url=${TAPPY_MESSAGE_BASE_URL:https://msg.tappy.vn/api/v1}
tappy.message.api-key=${TAPPY_MESSAGE_API_KEY:}
# Channel to deliver on: ZALO | LINE | WHATSAPP.
tappy.message.channel=${TAPPY_MESSAGE_CHANNEL:ZALO}
# OTP template (Zalo ZNS). Blank → the message service uses its configured default OTP template.
tappy.message.otp-template-id=${TAPPY_MESSAGE_OTP_TEMPLATE_ID:}
# Reminder templates (Zalo ZNS). Variables for appointment: {{customer_name}}, {{services}}, {{time}}, {{date}};
# for pawn due: {{customer_name}}, {{amount}}, {{date}}. Blank → that reminder is skipped.
tappy.message.appointment-reminder-template-id=${TAPPY_MESSAGE_APPOINTMENT_REMINDER_TEMPLATE_ID:}
tappy.message.pawn-due-reminder-template-id=${TAPPY_MESSAGE_PAWN_DUE_REMINDER_TEMPLATE_ID:}
# DEV/TEST ONLY: fixed registration OTP for deterministic E2E (set in application-dev.properties).
# Blank in prod → real random codes. Never set this in production.
tappy.otp.test-code=${TAPPY_OTP_TEST_CODE:}

# ── Pawn due reminders ──────────────────────────────────────
# Days before a contract's due date the borrower gets a reminder (0 = on the due date itself).
pawn.due.reminder-lead-days=${PAWN_DUE_REMINDER_LEAD_DAYS:3}
