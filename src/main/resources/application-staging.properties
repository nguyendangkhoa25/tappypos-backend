# Staging profile (stg-pos.tappy.vn) — runs on the production VM against the
# tappy_pos_staging database. Everything not set here falls back to
# application.properties; datasource/JWT/encryption come from container env vars.

# ─── Registration / password-reset OTP (STAGING = same as DEV) ────────────────
# Staging mirrors dev: the registration OTP is a fixed, deterministic code so a
# tester (or Playwright/Maestro) can complete the verify step without receiving a
# real message, and no Zalo/Tappy-Message send is performed.
#   • tappy.otp.test-code = 000000  → every OTP is "000000" (overridable via env).
#   • tappy.message.enabled = false → the code is only logged, never delivered.
# Production runs the `prod` profile, which sets neither — so prod generates real
# random codes and (with TAPPY_MESSAGE_ENABLED=true) actually sends them.
tappy.otp.test-code=${TAPPY_OTP_TEST_CODE:000000}
tappy.message.enabled=${TAPPY_MESSAGE_ENABLED:false}
