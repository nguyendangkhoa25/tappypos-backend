# Test Configuration - H2 In-Memory Database
spring.datasource.url=jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Hibernate/JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Logging
logging.level.com.tappy.pos=DEBUG
logging.level.org.springframework.boot=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# JWT Configuration
jwt.secret=test-secret-key-for-testing-purposes-with-more-than-256-bits-length-requirement-and-more-characters
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# Disable multi-tenant routing for tests
spring.jpa.properties.hibernate.connection.provider_disables_autocommit=true

# Security settings for tests
spring.security.user.name=testuser
spring.security.user.password=testpass

# Disable unnecessary auto-configurations for tests
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration

